const BGM_CONFIG = {

  boss:  { src: 'bgm/boss.mp3',  volume: 0.6, loop: true, title: '曲名をここに入力' }, // ボス戦BGM
};

const SE_CONFIG = {
  playerShoot: { src: 'soundeffects/player_shoot.wav',  volume: 0.1 },
  enemyShoot:  { src: 'soundeffects/enemy_shoot.wav',   volume: 0.4 },
  bossShoot:   { src: 'soundeffects/boss_shoot.wav',    volume: 0.5 },
  bomb:        { src: 'soundeffects/bomb.wav',           volume: 0.9 },
  playerHit:   { src: 'soundeffects/player_hit.wav',    volume: 0.8 },
  spellCard:   { src: 'soundeffects/spell_card.wav',    volume: 0.8 },
  playerBulletHit: { src: 'soundeffects/player_bullet_hit.wav', volume: 0.2 }, // 自機弾 命中
  enemyDeath:  { src: 'soundeffects/enemy_death.wav',   volume: 0.5 },
  powerItem:   { src: 'soundeffects/power_item.wav',    volume: 0.6 },
  bombItem:    { src: 'soundeffects/bomb_item.wav',     volume: 0.6 },
  menuMove:    { src: 'soundeffects/menu_move.wav',      volume: 0.7 }, // メニュー移動

// 画像を非同期でロードし、完了したら変数に格納する
let PLAYER_IMG    = null;
let BOSS_IMG      = null;
const _bossSpellImgs = {};  // spellName -> HTMLImageElement
let TITLE_BG_IMG  = null;
let HUD_IMG       = null;
const _bgImgs     = [null, null, null];
const _enemyImgs  = {};  // type -> HTMLImageElement

function loadImages() {
  if (PLAYER_IMAGE_SRC) {
    const img = new Image();
    img.onload  = () => { PLAYER_IMG = img; };
    img.onerror = () => { console.warn('[画像読み込み失敗] 自機画像:', PLAYER_IMAGE_SRC); };
    img.src = PLAYER_IMAGE_SRC;
  }
  if (BOSS_IMAGE_SRC) {
    const img = new Image();
    img.onload  = () => { BOSS_IMG = img; };
    img.onerror = () => { console.warn('[画像読み込み失敗] ボス画像:', BOSS_IMAGE_SRC); };
    img.src = BOSS_IMAGE_SRC;
  }
  if (TITLE_BG_SRC) {
    const img = new Image();
    img.onload  = () => { TITLE_BG_IMG = img; };
    img.onerror = () => { console.warn('[画像読み込み失敗] タイトル背景:', TITLE_BG_SRC); };
    img.src = TITLE_BG_SRC;
  }
  if (HUD_IMAGE_SRC) {
    const img = new Image();
    img.onload  = () => { HUD_IMG = img; };
    img.onerror = () => { console.warn('[画像読み込み失敗] HUD画像:', HUD_IMAGE_SRC); };
    img.src = HUD_IMAGE_SRC;
  }
  BG_LAYERS.forEach((cfg, i) => {
    if (!cfg.src) return;
    const img = new Image();
    img.onload  = () => { _bgImgs[i] = img; };
    img.onerror = () => { console.warn('[BG読み込み失敗] レイヤー'+(i+1)+':', cfg.src); };
    img.src = cfg.src;
  });
  // ボス スペルカード別 立ち絵ロード
  Object.entries(BOSS_SPELL_IMAGES).forEach(([name, cfg]) => {
    if (!cfg || !cfg.src) return;
    const img = new Image();
    img.onload  = () => { _bossSpellImgs[name] = img; };
    img.onerror = () => { console.warn('[ボス立ち絵読み込み失敗]', name, cfg.src); };
    img.src = cfg.src;
  });
  // 道中敵画像ロード（アニメーションWebP対応）
  Object.entries(ENEMY_IMAGES).forEach(([type, cfg]) => {
    if (!cfg || !cfg.src) return;
    const img = new Image();
    img.onload  = () => { _enemyImgs[type] = img; };
    img.onerror = () => { console.warn('[敵画像読み込み失敗] type=' + type + ':', cfg.src); };

}

// ===== ユーティリティ =====
function dist(x1,y1,x2,y2){ return Math.hypot(x2-x1,y2-y1); }
function clamp(v,mn,mx){ return Math.min(Math.max(v,mn),mx); }
function randInt(mn,mx){ return Math.floor(Math.random()*(mx-mn))+mn; }
function randFloat(mn,mx){ return Math.random()*(mx-mn)+mn; }


// ============================================================
//  SoundManager - 効果音管理
// ============================================================
class SoundManager {
  constructor() {
    this._buffers = {};
    this._ctx     = null;
    try {
      this._ctx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {
      console.warn('[SE] AudioContext 生成失敗:', e);
      return;
    }
    // fetch で全効果音をロード
    Object.entries(SE_CONFIG).forEach(([name, cfg]) => {
      if (cfg && cfg.src) this._load(name, cfg.src);
    });
  }

  _load(name, src) {
    if (!this._ctx) return;
    fetch(src)
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.arrayBuffer();
      })
      .then(arrayBuf => {
        // Safari は decodeAudioData が Promise を返さないため
        // コールバック形式で統一する
        return new Promise((resolve, reject) => {
          this._ctx.decodeAudioData(arrayBuf, resolve, reject);
        });
      })
      .then(decoded => {
        this._buffers[name] = decoded;
        console.log('[SE] ロード成功:', name);
      })
      .catch(e => {
        console.warn('[SE] ロード失敗:', name, e);
      });
  }

  // キー/クリック操作で必ず呼ぶ。suspended → running にする。
  resume() {
    if (!this._ctx) return;
    if (this._ctx.state === 'suspended') {
      this._ctx.resume().catch(() => {});
    }
  }

  play(name) {
    if (!this._ctx || !this._buffers[name]) return;
    // suspended のまま start() すると無音になるブラウザがあるため
    // running になってから再生する
    const doPlay = () => {
      try {
        const cfg  = SE_CONFIG[name];
        const s    = this._ctx.createBufferSource();
        const g    = this._ctx.createGain();
        s.buffer     = this._buffers[name];
        g.gain.value = (cfg && cfg.volume != null) ? cfg.volume : 1.0;
        s.connect(g);
        g.connect(this._ctx.destination);
        s.start(0);
      } catch(e) {}
    };
    if (this._ctx.state === 'running') {
      doPlay();
    } else {
      // suspended なら resume してから再生
      this._ctx.resume().then(doPlay).catch(() => {});
    }
  }
}

// ============================================================
//  BGMManager - ループBGM管理
//  HTMLAudioElement を使用（ループ・フェード対応）
// ============================================================
class BGMManager {
  constructor() {
    this._current = null;  // 再生中の Audio
    this._name    = null;  // 再生中のキー名
    this._audios  = {};    // name -> Audio（キャッシュ）
    // BGM_CONFIG の src が null でないものを事前生成
    Object.entries(BGM_CONFIG).forEach(([name, cfg]) => {
      if (!cfg || !cfg.src) return;
      try {
        const a = new Audio(cfg.src);
        a.loop   = cfg.loop  ?? true;
        a.volume = cfg.volume ?? 0.5;
        a.preload = 'auto';
        this._audios[name] = a;
      } catch(e) {}
    });
  }

  /** BGMを切り替えて再生。同じトラックが既に流れていれば何もしない */
  play(name) {
    if (this._name === name && this._current && !this._current.paused) return;
    this.stop();
    const a = this._audios[name];
    if (!a) return;
    this._current = a;
    this._name    = name;
    a.currentTime = 0;
    a.play().catch(() => {});
    // 曲名通知（BGM切り替え時にコールバック呼び出し）
    const title = (BGM_CONFIG[name] && BGM_CONFIG[name].title) || null;
    if (title && typeof this.onTrackChange === 'function') this.onTrackChange(title);
  }

  /** BGMを停止 */
  stop() {
    if (this._current) {
      this._current.pause();
      this._current.currentTime = 0;
    }
    this._current = null;
    this._name    = null;
  }

  /** 音量をリアルタイム変更 */
  setVolume(name, vol) {
    if (this._audios[name]) this._audios[name].volume = vol;
  }
}

// ============================================================
//  InputManager - キーボード入力の一元管理
// ============================================================
class InputManager {
  constructor() {
    this.keys        = new Set();
    this.justPressed = new Set();
    window.addEventListener('keydown', e => {
      if (!this.keys.has(e.code)) this.justPressed.add(e.code);
      this.keys.add(e.code);
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))
        e.preventDefault();
    });
    window.addEventListener('keyup', e => this.keys.delete(e.code));
  }
  isDown(c)        { return this.keys.has(c); }
  isJustPressed(c) { return this.justPressed.has(c); }
  clearJustPressed(){ this.justPressed.clear(); }
}


// ============================================================
//  PlayerBullet - 自機の弾
// ============================================================
class PlayerBullet {
  constructor(x, y, vx=0, vy=-16, power=10) {
    this.x=x; this.y=y; this.vx=vx; this.vy=vy;
    this.radius=4; this.power=power; this.active=true;
  }
  update() {
    this.x+=this.vx; this.y+=this.vy;
    if(this.y < -this.radius) this.active=false;
  }
  draw(ctx) {
    ctx.save();
    ctx.shadowColor='#88ffcc'; ctx.shadowBlur=8;
    ctx.beginPath();
    ctx.ellipse(this.x,this.y,this.radius*0.55,this.radius*1.9,0,0,Math.PI*2);
    const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.radius);
    g.addColorStop(0,'#ffffff'); g.addColorStop(0.5,'#aaffdd'); g.addColorStop(1,'#00cc88');
    ctx.fillStyle=g; ctx.fill(); ctx.restore();
  }
}


// ============================================================
//  BombEffect - ボム豪華演出
//  ① 画面全体フラッシュ
//  ② 自機中心から伸びる特大ビーム（8方向放射）
//  ③ 拡散する光のリング（多重）
//  ④ 中心から放射する光柱（上方向の巨大ビーム）
//  ⑤ 光の粒が画面全体を舞う
// ============================================================
class BombEffect {
  constructor(x, y) {
    this.x=x; this.y=y;
    this.life=100; this.max=100;
    this.active=true;

    // 8方向ビームの角度（45度ずつ）
    this.beamAngles = Array.from({length:8}, (_,i) => (Math.PI*2/8)*i);
    // 拡散リング
    this.rings = Array.from({length:6}, (_,i) => ({
      delay: i*6, r:0, maxR: 220+i*30, alpha:1, hue: 260+i*20
    }));
    // 光の粒パーティクル
    this.sparks = Array.from({length:60}, () => {
      const a=randFloat(0,Math.PI*2), s=randFloat(3,10);
      return { x:x, y:y, vx:Math.cos(a)*s, vy:Math.sin(a)*s,
               life:randInt(40,80), maxLife:0, hue:randInt(240,320), size:randFloat(2,5) };
    });
    this.sparks.forEach(s=>{ s.maxLife=s.life; });
  }

  update() {
    this.life--;
    if(this.life<=0){ this.active=false; return; }
    const elapsed = this.max - this.life;
    this.rings.forEach(r => {
      if(elapsed>=r.delay){
        r.r     = Math.min(r.r+7, r.maxR);
        r.alpha = 1 - r.r/r.maxR;
      }
    });
    this.sparks.forEach(s => {
      s.x+=s.vx; s.y+=s.vy;
      s.vx*=0.92; s.vy*=0.92;
      s.life--;
    });
  }

  draw(ctx) {
    const t   = this.max - this.life; // 経過フレーム
    const tot = this.max;
    ctx.save();

    // ① フラッシュ（0〜12f）：白い光が画面全体を包む
    if(t < 12) {
      const a = t<6 ? t/6 : 1-(t-6)/6; // 急速に明るくなり消える
      ctx.fillStyle=`rgba(255,255,255,${a*0.92})`;
      ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
    }

    // ④ 上方向への特大ビーム（main beam）- 細長い光柱が空に向かって噴き上がる
    if(t < 55) {
      const bAlpha = t<8 ? t/8 : Math.max(0, 1-(t-8)/47);
      const bHeight = Math.min(t*18, CANVAS_H); // フレームに合わせて伸びる
      const bw = 18 * (1-(t/55)*0.5); // 幅は時間で細くなる
      const bg = ctx.createLinearGradient(this.x, this.y, this.x, this.y-bHeight);
      bg.addColorStop(0, `rgba(255,255,255,${bAlpha})`);
      bg.addColorStop(0.3, `rgba(200,160,255,${bAlpha*0.9})`);
      bg.addColorStop(1, `rgba(120,80,255,0)`);
      ctx.fillStyle=bg;
      ctx.shadowColor='#cc88ff'; ctx.shadowBlur=30;
      ctx.fillRect(this.x-bw/2, this.y-bHeight, bw, bHeight);
      // ビームの両側のぼんやりした光
      const bg2 = ctx.createLinearGradient(this.x, this.y, this.x, this.y-bHeight*0.8);
      bg2.addColorStop(0, `rgba(200,150,255,${bAlpha*0.4})`);
      bg2.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle=bg2;
      ctx.fillRect(this.x-bw*2, this.y-bHeight*0.8, bw*4, bHeight*0.8);
    }

    // ② 8方向放射ビーム（斜め含む）
    if(t < 45) {
      const bAlpha = t<5 ? t/5 : Math.max(0,1-(t-5)/40);
      const bLen   = Math.min(t*15, 300);
      ctx.lineWidth = 3;
      this.beamAngles.forEach((angle, i) => {
        const hue = 260 + i*15;
        const g = ctx.createLinearGradient(
          this.x, this.y,
          this.x+Math.cos(angle)*bLen, this.y+Math.sin(angle)*bLen
        );
        g.addColorStop(0, `rgba(255,255,255,${bAlpha})`);
        g.addColorStop(0.4, `hsla(${hue},100%,80%,${bAlpha*0.8})`);
        g.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.strokeStyle=g;
        ctx.shadowColor=`hsl(${hue},100%,70%)`;
        ctx.shadowBlur=15;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x+Math.cos(angle)*bLen, this.y+Math.sin(angle)*bLen);
        ctx.stroke();
      });
    }

    // ③ 拡散リング
    this.rings.forEach(r => {
      if(r.r<=0) return;
      ctx.beginPath();
      ctx.arc(this.x, this.y, r.r, 0, Math.PI*2);
      ctx.strokeStyle=`hsla(${r.hue},100%,75%,${r.alpha*0.85})`;
      ctx.lineWidth=5*r.alpha+1;
      ctx.shadowColor=`hsl(${r.hue},100%,70%)`;
      ctx.shadowBlur=20;
      ctx.stroke();
    });

    // 中心の輝き（常時、徐々に消える）
    {
      const ca = Math.max(0, 1-(t/tot));
      const cr = 80 * (1-t/tot) + 20;
      const cg = ctx.createRadialGradient(this.x,this.y,0, this.x,this.y,cr);
      cg.addColorStop(0, `rgba(255,255,255,${ca})`);
      cg.addColorStop(0.3, `rgba(220,160,255,${ca*0.8})`);
      cg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle=cg;
      ctx.shadowBlur=0;
      ctx.beginPath(); ctx.arc(this.x,this.y,cr,0,Math.PI*2); ctx.fill();
    }

    // ⑤ 光の粒
    this.sparks.forEach(s => {
      if(s.life<=0) return;
      const a = s.life/s.maxLife;
      ctx.save();
      ctx.globalAlpha=a;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size*a, 0, Math.PI*2);
      ctx.fillStyle=`hsl(${s.hue},100%,80%)`;
      ctx.shadowColor=`hsl(${s.hue},100%,70%)`;
      ctx.shadowBlur=8;
      ctx.fill();
      ctx.restore();
    });

    ctx.restore();
  }
}


// ============================================================
//  Player - 自機の全処理
// ============================================================
class Player {
  constructor() {
    this.x=CANVAS_W/2; this.y=CANVAS_H-100;
    this.drawRadius=18;
    // 【東方スタイル】当たり判定を見た目より大幅に小さくする
    this.hitRadius=3;
    this.speed=5.2; this.slowSpeed=2.0;
    this.shootCooldown=0; this.shootInterval=5;
    this.invincible=0; this.invincibleDuration=180;
    this.animTick=0;
    this.bullets=[];
    // ===== 復活システム =====
    this.respawning      = false;
    this.respawnTimer    = 0;
    this.respawnDuration = 60;
    this.respawnStartY   = CANVAS_H + 30;
    this.respawnEndY     = CANVAS_H - 100;
    // ===== ボムシステム =====
    this.bombs=3;           // ボム残数（最大3）
    this.bombActive=false;  // ボム発動中フラグ
    this.bombTimer=0;       // 発動中カウンター
    this.bombDuration=90;   // ボムの持続フレーム数
    // ===== パワーアップシステム =====
    this.powerLevel=0;      // Pアイテム取得数（0〜20）
    this.powerMax=20;       // 最大パワーレベル
  }

  /**
   * 毎フレームの更新
   * @param {InputManager} input
   * @param {Game} game  ボム起動のためゲームオブジェクトを参照
   */
  update(input, game) {
    this.animTick++;

    // --- 復活演出中 ---
    if (this.respawning) {
      this.respawnTimer++;
      const t    = Math.min(this.respawnTimer / this.respawnDuration, 1.0);
      const ease = 1 - Math.pow(1 - t, 3);
      this.x = CANVAS_W / 2;
      this.y = this.respawnStartY + (this.respawnEndY - this.respawnStartY) * ease;
      if (this.respawnTimer >= this.respawnDuration) this.respawning = false;
      this.bullets.forEach(b => b.update());
      this.bullets = this.bullets.filter(b => b.active);
      if (this.invincible > 0) this.invincible--;
      return;
    }

    // --- 移動処理 ---
    const isSlow = input.isDown('ShiftLeft')||input.isDown('ShiftRight');
    const spd = isSlow ? this.slowSpeed : this.speed;
    const dx = (input.isDown('ArrowLeft')?-1:0)+(input.isDown('ArrowRight')?1:0);
    const dy = (input.isDown('ArrowUp')?-1:0)+(input.isDown('ArrowDown')?1:0);
    const len = Math.hypot(dx,dy);
    if(len>0){ this.x+=(dx/len)*spd; this.y+=(dy/len)*spd; }
    this.x=clamp(this.x,this.drawRadius,CANVAS_W-this.drawRadius);
    this.y=clamp(this.y,this.drawRadius,CANVAS_H-this.drawRadius);

    // --- ショット処理（ZキーまたはSpaceキー）---
    if(this.shootCooldown>0) this.shootCooldown--;
    if((input.isDown('KeyZ')||input.isDown('Space'))&&this.shootCooldown===0){
      this.shootCooldown=this.shootInterval;
      // パワーレベルに応じた弾の威力（基本10、最大30）
      const bp = 10 + this.powerLevel;
      // 3列弾（左列・中央列・右列）
      this.bullets.push(new PlayerBullet(this.x-8,  this.y-4,  -1.5, -15.5, bp));
      this.bullets.push(new PlayerBullet(this.x,    this.y-12,  0.0, -16,   bp));
      this.bullets.push(new PlayerBullet(this.x+8,  this.y-4,   1.5, -15.5, bp));
      window._SE && window._SE.play('playerShoot');
    }

    // --- ボム発動処理（Xキーを押した瞬間だけ発動）---
    if(input.isJustPressed('KeyX') && this.bombs>0 && !this.bombActive){
      this.bombs--;
      this.bombActive=true;
      this.bombTimer=this.bombDuration;
      // ボム発動中は無敵
      this.invincible=this.bombDuration+30;
      // ゲームにボム処理を依頼（弾消し・ダメージ）
      game.activateBomb(this.x, this.y);
    }

    // --- ボムタイマー管理 ---
    if(this.bombActive){ this.bombTimer--; if(this.bombTimer<=0) this.bombActive=false; }

    // --- 無敵時間カウントダウン ---
    if(this.invincible>0) this.invincible--;

    // --- 弾の更新・画面外削除 ---
    this.bullets.forEach(b=>b.update());
    this.bullets=this.bullets.filter(b=>b.active);
  }

  hit() {
    if (this.invincible > 0) return false;
    this.invincible     = this.invincibleDuration;
    this.respawning     = true;
    this.respawnTimer   = 0;
    this.x              = CANVAS_W / 2;
    this.y              = this.respawnStartY;
    this.bullets        = [];
    this.bombs          = 3; // 被弾時にボムを3にリセット
    return true;
  }

  draw(ctx, input) {
    // 復活中 + まだ画面外(y > CANVAS_H)なら描画しない
    if (this.respawning && this.y > CANVAS_H) return;
    // 無敵中は点滅（復活アニメ中・ボム発動中は点滅しない）
    if (this.invincible > 0 && !this.bombActive && !this.respawning
        && Math.floor(this.invincible / 4) % 2 === 0) return;

    // ── PNG画像モード ──────────────────────────────────────
    if (PLAYER_IMG) {
      // 左右移動中に最大15度傾ける
      const dx = (input&&input.isDown('ArrowLeft')?-1:0)+(input&&input.isDown('ArrowRight')?1:0);
      const tiltAngle = dx * (13 * Math.PI / 180);

      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(tiltAngle);
      if (this.bombActive) { ctx.shadowColor=`hsl(${this.animTick*5%360},100%,70%)`; ctx.shadowBlur=28; }
      ctx.drawImage(PLAYER_IMG, -PLAYER_IMG_W/2, -PLAYER_IMG_H/2, PLAYER_IMG_W, PLAYER_IMG_H);
      ctx.restore();

      // Shift: 当たり判定可視化（傾きなし・自機中心基準で描く）
      const isSlowP = input&&(input.isDown('ShiftLeft')||input.isDown('ShiftRight'));
      if (isSlowP) {
        ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.animTick*0.05);
        for(let i=0;i<8;i++){
          const a=(Math.PI*2/8)*i;
          ctx.beginPath(); ctx.arc(Math.cos(a)*10,Math.sin(a)*10,2,0,Math.PI*2);
          ctx.fillStyle='rgba(255,100,150,0.85)'; ctx.shadowColor='#ff6699'; ctx.shadowBlur=6; ctx.fill();
        }
        ctx.restore();
        ctx.save(); ctx.translate(this.x, this.y);
        ctx.beginPath(); ctx.arc(0,0,this.hitRadius,0,Math.PI*2);
        ctx.fillStyle='#ff3366'; ctx.shadowColor='#ff0044'; ctx.shadowBlur=8; ctx.fill();
        ctx.restore();
      }
      this.bullets.forEach(b=>b.draw(ctx));
      return;
    }

    // ── デフォルト描画（PNG未設定時）─────────────────────
    ctx.save();
    ctx.translate(this.x, this.y);
    const t=this.animTick;
    if(this.bombActive){ ctx.shadowColor=`hsl(${t*5%360},100%,70%)`; ctx.shadowBlur=28; }

    // エネルギーウィング（左）
    ctx.beginPath();
    ctx.moveTo(0,0); ctx.bezierCurveTo(-30,-10,-45,10,-35,25); ctx.bezierCurveTo(-25,35,-10,20,0,15); ctx.closePath();
    const wingG=ctx.createLinearGradient(-45,0,0,0);
    wingG.addColorStop(0,'rgba(100,180,255,0)'); wingG.addColorStop(0.5,'rgba(100,180,255,0.4)'); wingG.addColorStop(1,'rgba(200,220,255,0.7)');
    ctx.fillStyle=wingG; ctx.fill();
    // エネルギーウィング（右）
    ctx.save(); ctx.scale(-1,1);
    ctx.beginPath(); ctx.moveTo(0,0); ctx.bezierCurveTo(-30,-10,-45,10,-35,25); ctx.bezierCurveTo(-25,35,-10,20,0,15); ctx.closePath();
    ctx.fillStyle=wingG; ctx.fill(); ctx.restore();

    // 機体本体
    ctx.beginPath(); ctx.moveTo(0,-18); ctx.lineTo(-12,15); ctx.lineTo(12,15); ctx.closePath();
    const bodyG=ctx.createLinearGradient(0,-18,0,15);
    bodyG.addColorStop(0,'#ffffff');
    bodyG.addColorStop(0.4, this.bombActive ? `hsl(${t*4%360},100%,85%)` : '#aaddff');
    bodyG.addColorStop(1,'#5588cc');
    ctx.fillStyle=bodyG;
    if(!this.bombActive){ ctx.shadowColor='#88ccff'; ctx.shadowBlur=12; }
    ctx.fill(); ctx.strokeStyle='rgba(200,230,255,0.8)'; ctx.lineWidth=1.5; ctx.stroke();

    // エンジン炎
    const fH=8+Math.sin(t*0.3)*3;
    ctx.beginPath(); ctx.moveTo(-6,15); ctx.lineTo(6,15); ctx.lineTo(0,15+fH); ctx.closePath();
    const fG=ctx.createLinearGradient(0,15,0,15+fH);
    fG.addColorStop(0,'rgba(255,255,200,0.9)'); fG.addColorStop(0.5,'rgba(100,180,255,0.6)'); fG.addColorStop(1,'rgba(100,180,255,0)');
    ctx.fillStyle=fG; ctx.shadowColor='#aaddff'; ctx.shadowBlur=10; ctx.fill();

    // Shift中の当たり判定可視化
    const isSlow=input&&(input.isDown('ShiftLeft')||input.isDown('ShiftRight'));
    if(isSlow){
      ctx.save(); ctx.rotate(t*0.05);
      for(let i=0;i<8;i++){
        const a=(Math.PI*2/8)*i;
        ctx.beginPath(); ctx.arc(Math.cos(a)*10,Math.sin(a)*10,2,0,Math.PI*2);
        ctx.fillStyle='rgba(255,100,150,0.85)'; ctx.shadowColor='#ff6699'; ctx.shadowBlur=6; ctx.fill();
      }
      ctx.restore();
      ctx.beginPath(); ctx.arc(0,0,this.hitRadius,0,Math.PI*2);
      ctx.fillStyle='#ff3366'; ctx.shadowColor='#ff0044'; ctx.shadowBlur=8; ctx.fill();
      ctx.beginPath(); ctx.arc(0,0,this.hitRadius+3,0,Math.PI*2);
      ctx.strokeStyle='rgba(255,100,150,0.6)'; ctx.lineWidth=1; ctx.shadowBlur=0; ctx.stroke();
    }
    ctx.restore();
    this.bullets.forEach(b=>b.draw(ctx));
  }
}


// ============================================================
//  EnemyBullet - 敵弾（弾幕の1粒）
// ============================================================
class EnemyBullet {
  constructor(x,y,vx,vy,color='#ff4444',r=6) {
    this.x=x; this.y=y; this.vx=vx; this.vy=vy;
    this.color=color; this.radius=r; this.hitRadius=r*0.6; this.active=true;
  }
  update() {
    this.x+=this.vx; this.y+=this.vy;
    if(this.x<-this.radius*3||this.x>CANVAS_W+this.radius*3||
       this.y<-this.radius*3||this.y>CANVAS_H+this.radius*3) this.active=false;
  }
  draw(ctx) {
    ctx.save();
    ctx.shadowColor=this.color; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
    ctx.fillStyle=this.color; ctx.fill();
    ctx.beginPath(); ctx.arc(this.x,this.y,this.radius*0.42,0,Math.PI*2);
    ctx.fillStyle='#ffffff'; ctx.shadowBlur=4; ctx.fill();
    ctx.restore();
  }
}


// ============================================================
//  Particle - 爆発エフェクト用パーティクル
// ============================================================
class Particle {
  constructor(x,y,color,size=null,speedMult=1) {
    this.x=x; this.y=y;
    const s=(size??randFloat(1.5,4.5))*speedMult;
    const a=randFloat(0,Math.PI*2);
    this.vx=Math.cos(a)*s; this.vy=Math.sin(a)*s;
    this.life=randInt(20,45); this.maxLife=this.life;
    this.radius=size??randFloat(2,5);
    this.color=color; this.active=true;
  }
  update() {
    this.x+=this.vx; this.y+=this.vy;
    this.vx*=0.94; this.vy*=0.94;
    this.life--; if(this.life<=0) this.active=false;
  }
  draw(ctx) {
    const a=this.life/this.maxLife;
    ctx.save(); ctx.globalAlpha=a;
    ctx.beginPath(); ctx.arc(this.x,this.y,Math.max(this.radius*a,0.5),0,Math.PI*2);
    ctx.fillStyle=this.color; ctx.shadowColor=this.color; ctx.shadowBlur=6; ctx.fill();
    ctx.restore();
  }
}


// ============================================================
//  PowerItem - 敵撃破時にドロップするパワーアップアイテム
//  赤い正方形に「P」マーク。取得すると自機の攻撃力が上昇する
// ============================================================
class PowerItem {
  constructor(x, y) {
    this.x=x; this.y=y;
    this.vy=1.8; // ゆっくり落下
    this.active=true;
    this.animTick=0;
    this.radius=9; // 当たり判定半径（正方形の半辺）
    this.size=14;  // 描画サイズ
  }

  update() {
    this.y += this.vy;
    this.animTick++;
    if(this.y > CANVAS_H+20) this.active=false;
  }

  draw(ctx) {
    const t=this.animTick;
    const pulse=0.85+Math.sin(t*0.15)*0.15; // 0.7〜1.0で点滅
    ctx.save();
    ctx.globalAlpha=pulse;
    ctx.translate(this.x, this.y);
    // 赤い正方形
    const s=this.size;
    ctx.shadowColor='#ff2222'; ctx.shadowBlur=12;
    ctx.fillStyle='#cc0000';
    ctx.fillRect(-s/2, -s/2, s, s);
    // 明るい縁取り
    ctx.strokeStyle='#ff8888'; ctx.lineWidth=1.5; ctx.shadowBlur=0;
    ctx.strokeRect(-s/2, -s/2, s, s);
    // 「P」文字
    ctx.fillStyle='#ffffff';
    ctx.font=`bold ${s-2}px monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='#ffffff'; ctx.shadowBlur=6;
    ctx.fillText('P', 0, 1);
    ctx.restore();
  }
}


// ============================================================
//  BombItem - ボムアップアイテム
//  青い正方形に白カタカナ「ボ」。取得でボム+1
// ============================================================
class BombItem {
  constructor(x, y) {
    this.x=x; this.y=y;
    this.vy=1.8;
    this.active=true;
    this.animTick=0;
    this.radius=9;
    this.size=14;
  }
  update() {
    this.y += this.vy;
    this.animTick++;
    if(this.y > CANVAS_H+20) this.active=false;
  }
  draw(ctx) {
    const pulse=0.85+Math.sin(this.animTick*0.15)*0.15;
    ctx.save();
    ctx.globalAlpha=pulse;
    ctx.translate(this.x, this.y);
    const s=this.size;
    ctx.shadowColor='#2255ff'; ctx.shadowBlur=12;
    ctx.fillStyle='#0033cc';
    ctx.fillRect(-s/2, -s/2, s, s);
    ctx.strokeStyle='#88aaff'; ctx.lineWidth=1.5; ctx.shadowBlur=0;
    ctx.strokeRect(-s/2, -s/2, s, s);
    ctx.fillStyle='#ffffff';
    ctx.font=`bold ${s-2}px monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='#ffffff'; ctx.shadowBlur=6;
    ctx.fillText('ボ', 0, 1);
    ctx.restore();
  }
}


// ============================================================
//  Enemy - 雑魚敵（強化版）
//  4タイプの異なる弾幕パターンと高HPを持つ
//  ★ 弾はゲーム共通プール(bulletPool)に発射する
//    → 敵が撃破されても弾は画面外に出るまで飛び続ける
// ============================================================
class Enemy {
  /**
   * @param {number}       x
   * @param {number}       y
   * @param {Player}       player
   * @param {string}       type       'normal'|'spread'|'fast'|'fortress'
   * @param {EnemyBullet[]} bulletPool ゲーム側が管理する共通弾プール
   */
  constructor(x,y,player,type='normal',bulletPool) {
    this.x=x; this.y=y; this.player=player; this.type=type;
    // ゲーム共通プールへの参照を保持（敵が消えても弾が残る仕組みの核心）
    this.bulletPool = bulletPool;
    this.animTick=0; this.active=true;
    this.shootCount=0;

    // タイプ別ステータス
    switch(type){
      case 'spread': // 拡散弾タイプ：5-Way
        this.radius=17; this.hp=this.maxHp=55;
        this.speed=randFloat(0.6,1.2); this.shootInterval=randInt(55,80);
        this.score=200; this.hue=200; break;
      case 'fast': // 高速弾タイプ：超速3-Way
        this.radius=13; this.hp=this.maxHp=35;
        this.speed=randFloat(1.5,2.5); this.shootInterval=randInt(38,58);
        this.score=150; this.hue=280; break;
      case 'fortress': // 要塞タイプ：全方位8弾
        this.radius=22; this.hp=this.maxHp=130;
        this.speed=randFloat(0.3,0.7); this.shootInterval=randInt(75,95);
        this.score=400; this.hue=0; break;
      default: // normal：自機狙い+時々高速弾
        this.radius=16; this.hp=this.maxHp=50;
        this.speed=randFloat(0.9,1.8); this.shootInterval=randInt(62,98);
        this.score=100; this.hue=240;
    }
    this.shootCooldown=randInt(30,90);
    this.wobbleOffset=randFloat(0,Math.PI*2);
    this.wobbleSpeed=randFloat(0.02,0.05);
    this.wobbleAmp=randFloat(1.0,3.0);
    this._flashTimer=0;  // 被弾フラッシュ用
  }

  /** 【弾幕①】自機狙い1発 - atan2でプレイヤー方向を計算 */
  shootAimed(speedMult=1) {
    const angle=Math.atan2(this.player.y-this.y,this.player.x-this.x);
    const speed=randFloat(3.8,5.2)*speedMult;
    this.bulletPool.push(new EnemyBullet(this.x,this.y,Math.cos(angle)*speed,Math.sin(angle)*speed,'#ff4444',6));
  }

  /** 【弾幕②】自機狙い5-Way扇弾 - spreadタイプ */
  shoot5Way() {
    const base=Math.atan2(this.player.y-this.y,this.player.x-this.x);
    for(let i=-2;i<=2;i++){
      const a=base+i*0.22;
      this.bulletPool.push(new EnemyBullet(this.x,this.y,Math.cos(a)*4.0,Math.sin(a)*4.0,'#4488ff',6));
    }
  }

  /** 【弾幕③】超高速3-Way - fastタイプ */
  shootFast3Way() {
    const base=Math.atan2(this.player.y-this.y,this.player.x-this.x);
    for(let i=-1;i<=1;i++){
      const a=base+i*0.18;
      this.bulletPool.push(new EnemyBullet(this.x,this.y,Math.cos(a)*7.5,Math.sin(a)*7.5,'#ff88ff',5));
    }
  }

  /** 【弾幕④】全方位8弾 - fortressタイプ、cos/sinで均等角度配置 */
  shoot8Way() {
    for(let i=0;i<8;i++){
      const a=(Math.PI*2/8)*i+this.animTick*0.05;
      this.bulletPool.push(new EnemyBullet(this.x,this.y,Math.cos(a)*3.4,Math.sin(a)*3.4,'#ff6600',6));
    }
  }

  update() {
    this.animTick++;
    if (this._flashTimer > 0) this._flashTimer--;
    this.x+=Math.sin(this.animTick*this.wobbleSpeed+this.wobbleOffset)*this.wobbleAmp;
    this.y+=this.speed;
    if(this.shootCooldown>0){ this.shootCooldown--; }
    else {
      this.shootCooldown=this.shootInterval; this.shootCount++;
      window._SE && window._SE.play('enemyShoot');
      switch(this.type){
        case 'spread': this.shoot5Way(); if(this.shootCount%3===0) this.shootAimed(0.9); break;
        case 'fast':   this.shootFast3Way(); break;
        case 'fortress': this.shoot8Way(); if(this.shootCount%2===0) this.shootAimed(1.2); break;
        default: this.shootAimed(); if(this.shootCount%4===0) this.shootAimed(1.4); break;
      }
    }
    // 画面下に完全に出たら自身を非アクティブに（弾はプール側で管理）
    if(this.y>CANVAS_H+this.radius*2) this.active=false;
  }

  damage(dmg) {
    this.hp-=dmg;
    this._flashTimer=6;  // 被弾フラッシュ（6フレーム）
    if(this.hp<=0){ this.active=false; return true; } return false;
  }

  draw(ctx) {
    const img = _enemyImgs[this.type];
    const cfg = ENEMY_IMAGES[this.type];

    if (img && cfg) {
      // ── 画像モード（アニメーションWebP / PNG）──
      const hp = this.hp / this.maxHp;
      const w  = cfg.width, h = cfg.height;
      ctx.save();
      ctx.translate(this.x, this.y);
      // 被ダメージ時に赤くフラッシュ
      if (this._flashTimer > 0) {
        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = 0.55 + 0.45 * (this._flashTimer / 6);
        ctx.filter = 'brightness(2) saturate(0) sepia(1) hue-rotate(-30deg)';
      }
      ctx.drawImage(img, -w / 2, -h / 2, w, h);
      ctx.filter = 'none';
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      ctx.restore();
    } else {
      // ── ベクターモード（デフォルト）──
      ctx.save(); ctx.translate(this.x,this.y);
      const t=this.animTick, hp=this.hp/this.maxHp;
      const sides=this.type==='fortress'?4:6;
      const rot=this.type==='fortress'?Math.PI/4+t*0.01:-Math.PI/6+t*0.03;
      ctx.beginPath();
      for(let i=0;i<sides;i++){
        const a=(Math.PI*2/sides)*i+rot;
        if(i===0) ctx.moveTo(Math.cos(a)*this.radius,Math.sin(a)*this.radius);
        else ctx.lineTo(Math.cos(a)*this.radius,Math.sin(a)*this.radius);
      }
      ctx.closePath();
      ctx.fillStyle=`hsl(${this.hue},${70+30*hp}%,${25+20*hp}%)`;
      ctx.shadowColor=`hsl(${this.hue},100%,60%)`; ctx.shadowBlur=12; ctx.fill();
      ctx.strokeStyle=`hsla(${this.hue},100%,80%,0.8)`; ctx.lineWidth=1.5; ctx.stroke();
      ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2);
      ctx.fillStyle=`hsl(${this.hue+60},100%,80%)`; ctx.shadowColor=`hsl(${this.hue+60},100%,60%)`; ctx.shadowBlur=8; ctx.fill();
      if(this.type==='fortress'){
        ctx.beginPath(); ctx.arc(0,0,this.radius+5,0,Math.PI*2);
        ctx.strokeStyle=`hsla(${this.hue},90%,60%,0.4)`; ctx.lineWidth=2; ctx.shadowBlur=0; ctx.stroke();
      }
      ctx.restore();
    }
    // ★ 弾はゲーム側のプールから描画するのでここでは描画しない
  }
}


// ============================================================
//  Boss - ボス敵
//  5枚のスペルカードシステムを持つ最強の敵
// ============================================================
class Boss {
  constructor(player, game) {
    this.player=player;
    this.game=game; // アイテムドロップのためゲーム参照を保持
    this.x=CANVAS_W/2; this.y=-60; this.targetY=100;
    this.radius=32; this.animTick=0; this.patternTimer=0;
    this.spiralAngle=0; this.moveTimer=0;
    this.active=true; this.bullets=[]; this.entering=true;
    this.score=8000;

    // ===== スペルカード定義（5枚）=====
    // 各カードはHP・名前・カラーテーマ・弾幕メソッド名を持つ
    this.spellCards = [
      { name:'妖符「紅蝶乱舞」',         nameEn:'Demon Sign "Dance of Crimson Butterflies"',  hp:3000, maxHp:3000, bgHue:350, method:'sc1' },
      { name:'霊符「幽霊の輪舞曲」',     nameEn:'Spirit Sign "Waltz of Phantoms"',             hp:3500, maxHp:3500, bgHue:240, method:'sc2' },
      { name:'星符「星屑の奔流」',       nameEn:'Star Sign "Torrent of Stardust"',             hp:4000, maxHp:4000, bgHue:55,  method:'sc3' },
      { name:'禁忌「永夜の花嵐」',       nameEn:'Forbidden "Eternal Night Flower Storm"',       hp:4500, maxHp:4500, bgHue:290, method:'sc4' },
      { name:'神霊「光の三位一体」',     nameEn:'Divine Spirit "Holy Trinity of Light"',        hp:5000, maxHp:5000, bgHue:180, method:'sc5' },
    ];

    this.currentCard=0;
    this.cardTimer=0;
    this.cardAnnounce=0; // アナウンス表示カウンター
    this.ceasefireTimer=0; // 停戦猶予カウンター（この間は弾を撃たない）

    // 最初のカードのHPをセット
    this.hp=this.spellCards[0].hp;
    this.maxHp=this.spellCards[0].maxHp;
  }

  get card(){ return this.spellCards[this.currentCard]; }

  // ----- 共通発射ヘルパー -----
  /** 全方位N-Way弾 - cos/sinで均等角度に展開 */
  shootNWay(n,speed,color,offset=0){
    for(let i=0;i<n;i++){
      const a=(Math.PI*2/n)*i+offset;
      this.bullets.push(new EnemyBullet(this.x,this.y,Math.cos(a)*speed,Math.sin(a)*speed,color,7));
    }
  }

  /** 螺旋弾 - spiralAngleを毎回増やすことで方向が変化し螺旋を形成 */
  shootSpiral(arms,speed,color,step=0.18){
    for(let arm=0;arm<arms;arm++){
      const a=this.spiralAngle+arm*(Math.PI*2/arms);
      this.bullets.push(new EnemyBullet(this.x,this.y,Math.cos(a)*speed,Math.sin(a)*speed,color,6));
    }
    this.spiralAngle+=step;
  }

  /** 自機狙い扇状弾 - atan2でプレイヤー方向を中心に扇形展開 */
  shootFanAimed(n,spread,speed,color){
    const base=Math.atan2(this.player.y-this.y,this.player.x-this.x);
    for(let i=0;i<n;i++){
      const a=base-(spread*(n-1)/2)+spread*i;
      this.bullets.push(new EnemyBullet(this.x,this.y,Math.cos(a)*speed,Math.sin(a)*speed,color,6));
    }
  }

  // ----- スペルカード別弾幕メソッド -----

  /**
   * スペルカード1「妖符「紅蝶乱舞」」
   * 赤い蝶が舞うような2腕螺旋と自機狙い扇弾の組み合わせ
   */
  sc1(t){
    // 2腕赤螺旋：8フレームごとに発射（ゆったりした蝶の羽ばたき）
    if(t%8===0) this.shootSpiral(2,2.8,'#ff2255',0.22);
    // 5-Way扇弾：90フレームごと
    if(t%90===0) this.shootFanAimed(5,0.28,3.2,'#ff8899');
    // 全方位12弾：180フレームごと
    if(t%180===0) this.shootNWay(12,2.5,'#ff3344',this.spiralAngle);
  }

  /**
   * スペルカード2「霊符「幽霊の輪舞曲」」
   * 周期的な全方位リング弾幕が輪舞を演出
   */
  sc2(t){
    // 全方位リング：90フレームごとに2重輪
    if(t%90===0)  this.shootNWay(16,1.8,'#4488ff',t*0.05);
    if(t%90===45) this.shootNWay(16,2.5,'#8844ff',t*0.05+Math.PI/16);
    // 4腕ゆっくり螺旋：12フレームごと
    if(t%12===0)  this.shootSpiral(4,1.5,'#aaaaff',0.08);
    // 自機狙い3-Way：75フレームごと
    if(t%75===0)  this.shootFanAimed(3,0.25,4.0,'#ccaaff');
  }

  /**
   * スペルカード3「星符「星屑の奔流」」
   * 高密度の自機狙い弾幕が流星群のように降り注ぐ
   */
  sc3(t){
    // 高密度3-Way：12フレームごと（流星群）
    if(t%12===0)  this.shootFanAimed(3,0.20,4.8,'#ffdd00');
    // 7-Way：60フレームごと
    if(t%60===0)  this.shootFanAimed(7,0.35,3.6,'#ffaa00');
    // 全方位20弾：150フレームごと
    if(t%150===0) this.shootNWay(20,2.2,'#ffee44',this.spiralAngle);
    this.spiralAngle+=0.03;
  }

  /**
   * スペルカード4「禁忌「永夜の花嵐」」
   * 正回転と逆回転の6腕螺旋が交錯する
   */
  sc4(t){
    // 正逆6腕螺旋：8フレームごと
    if(t%8===0){
      this.shootSpiral(6,3.2,'#ff44cc',0.20);
      for(let arm=0;arm<6;arm++){
        const a=-this.spiralAngle+arm*(Math.PI/3);
        this.bullets.push(new EnemyBullet(this.x,this.y,Math.cos(a)*2.8,Math.sin(a)*2.8,'#aa44ff',6));
      }
    }
    // 9-Way扇弾：120フレームごと
    if(t%120===0) this.shootFanAimed(9,0.22,3.6,'#ff88cc');
  }

  /**
   * スペルカード5「神霊「光の三位一体」」
   * 3軸の正逆螺旋+全方位24弾+大扇弾の最終形態
   */
  sc5(t){
    // 3軸正逆螺旋：6フレームごと（最終形態）
    if(t%6===0){
      const spd=3.0+Math.sin(t*0.04)*1.2;
      this.shootSpiral(3,spd,'#00ffcc',0.25);
      const spd2=2.5+Math.cos(t*0.06)*1.0;
      for(let arm=0;arm<3;arm++){
        const a=-this.spiralAngle+arm*(Math.PI*2/3);
        this.bullets.push(new EnemyBullet(this.x,this.y,Math.cos(a)*spd2,Math.sin(a)*spd2,'#ff8800',6));
      }
    }
    // 全方位24弾：80フレームごと（神聖な輪）
    if(t%80===0)  this.shootNWay(24,2.6,'#ffffff',t*0.02);
    // 11-Way大扇：120フレームごと
    if(t%120===0) this.shootFanAimed(11,0.18,4.2,'#66ffff');
  }

  /** スペルカードを次に進める */
  nextSpellCard(){
    window._SE && window._SE.play('spellCard');
    // スペルカード撃破時のアイテムドロップ（ゲームに通知）
    if(this.game){
      // Pアイテム 3〜5個
      const pCount = randInt(3,6);
      for(let i=0;i<pCount;i++){
        const ox=randFloat(-40,40), oy=randFloat(0,30);
        this.game.powerItems.push(new PowerItem(this.x+ox, this.y+oy));
      }
      // ボムアイテム 1個
      this.game.bombItems.push(new BombItem(this.x+randFloat(-20,20), this.y+randFloat(0,20)));
    }
    this.currentCard++;
    if(this.currentCard>=this.spellCards.length){ this.active=false; return; }
    const c=this.spellCards[this.currentCard];
    this.hp=c.hp; this.maxHp=c.maxHp;
    // カード切り替え時は全弾消し（プレイヤーへの恩恵）
    this.bullets=[];
    // cardAnnounce=270フレーム（約9秒@30fps）大きく表示
    this.cardAnnounce=270; this.cardTimer=0; this.patternTimer=0; this.spiralAngle=0;
    // ceasefireTimer: この間は弾を撃たない（演出猶予）
    this.ceasefireTimer = 90;
  }

  damage(dmg){
    this.hp-=dmg;
    if(this.hp<=0){ this.hp=0; this.nextSpellCard(); return true; } return false;
  }

  update(){
    this.animTick++; this.patternTimer++; this.cardTimer++;
    // 入場演出
    if(this.entering){
      this.y+=1.5;
      if(this.y>=this.targetY){
        this.y=this.targetY; this.entering=false;
        // 入場直後も270フレームのアナウンス+90フレームの停戦を付与
        this.cardAnnounce=270;
        this.ceasefireTimer=90;
      }
      return;
    }
    if(!this.active) return;
    if(this.cardAnnounce>0) this.cardAnnounce--;
    // 停戦猶予カウントダウン（0より大きい間は弾を撃たない）
    if(this.ceasefireTimer>0){ this.ceasefireTimer--; }

    this.moveTimer++;
    this.x=CANVAS_W/2+Math.sin(this.moveTimer*0.012)*120;

    // 停戦猶予が終わったら弾幕を発射
    if(this.ceasefireTimer===0){
      const _prevLen = this.bullets.length;
      const method=this.card.method;
      if(this[method]) this[method](this.cardTimer);
      if (this.bullets.length > _prevLen) window._SE && window._SE.play('bossShoot');
    }

    this.bullets.forEach(b=>b.update());
    this.bullets=this.bullets.filter(b=>b.active);
  }

  draw(ctx){
    if(!this.active) return;
    // スペルカード背景演出（薄い色を全画面に敷く）
    ctx.fillStyle=`hsla(${this.card.bgHue},80%,50%,0.06)`;
    ctx.fillRect(0,0,CANVAS_W,CANVAS_H);

    ctx.save(); ctx.translate(this.x,this.y);
    const t=this.animTick, card=this.card;

    // 外側の回転リング（カード色に対応）
    for(let ring=0;ring<3;ring++){
      const rR=this.radius+18+ring*14;
      const rot=t*(ring%2===0?0.025:-0.018);
      const seg=6+ring*2;
      ctx.beginPath();
      for(let i=0;i<seg;i++){
        const a=(Math.PI*2/seg)*i+rot;
        if(i===0) ctx.moveTo(Math.cos(a)*rR,Math.sin(a)*rR);
        else ctx.lineTo(Math.cos(a)*rR,Math.sin(a)*rR);
      }
      ctx.closePath();
      ctx.strokeStyle=`hsla(${card.bgHue+ring*30},100%,70%,${0.5-ring*0.1})`;
      ctx.lineWidth=2; ctx.shadowColor=`hsl(${card.bgHue},100%,70%)`; ctx.shadowBlur=15; ctx.stroke();
    }

    // 本体描画：スペルカード別立ち絵 > 通常ボス画像 > デフォルト
    const spellImg = _bossSpellImgs[this.card.name];
    const spellCfg = BOSS_SPELL_IMAGES[this.card.name];
    if (spellImg && spellCfg) {
      // スペルカード発動中の立ち絵（発動アナウンス時はフェードイン）
      const fadeAlpha = this.cardAnnounce > 0
        ? Math.min(1, 1 - (this.cardAnnounce - 210) / 60)  // 最初60fでフェードイン
        : 1;
      ctx.globalAlpha = Math.max(0, Math.min(1, fadeAlpha));
      ctx.drawImage(spellImg, -spellCfg.width/2, -spellCfg.height/2, spellCfg.width, spellCfg.height);
      ctx.globalAlpha = 1;
    } else if (BOSS_IMG) {
      ctx.drawImage(BOSS_IMG, -BOSS_IMG_W/2, -BOSS_IMG_H/2, BOSS_IMG_W, BOSS_IMG_H);
    } else {
      // デフォルト：グラデーション円＋瞳
      const grad=ctx.createRadialGradient(0,0,0,0,0,this.radius);
      grad.addColorStop(0,'#ffffff');
      grad.addColorStop(0.3,`hsl(${card.bgHue},90%,60%)`);
      grad.addColorStop(1,`hsla(${card.bgHue},80%,20%,0.8)`);
      ctx.beginPath(); ctx.arc(0,0,this.radius,0,Math.PI*2);
      ctx.fillStyle=grad; ctx.shadowColor=`hsl(${card.bgHue},100%,60%)`; ctx.shadowBlur=25; ctx.fill();
      // プレイヤーを追跡する瞳
      ctx.beginPath(); ctx.arc(0,-6,11,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.92)'; ctx.shadowBlur=0; ctx.fill();
      const ea=Math.atan2(this.player.y-this.y,this.player.x-this.x);
      const px=Math.cos(ea)*4.5, py=Math.sin(ea)*4.5-6;
      ctx.beginPath(); ctx.arc(px,py,5.5,0,Math.PI*2);
      ctx.fillStyle=`hsl(${card.bgHue},90%,35%)`; ctx.fill();
      ctx.beginPath(); ctx.arc(px,py,2.5,0,Math.PI*2); ctx.fillStyle='#000'; ctx.fill();
      ctx.beginPath(); ctx.arc(px+1.5,py-1.5,1.2,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
    }

    ctx.restore();
    this.drawHPBar(ctx);
    this.drawSpellCardName(ctx);
    this.bullets.forEach(b=>b.draw(ctx));
  }

  drawHPBar(ctx){
    const card=this.card;
    const bW=CANVAS_W-40, bH=10, bX=20, bY=8;
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(bX-2,bY-2,bW+4,bH+4);
    const hpR=clamp(this.hp/this.maxHp,0,1);
    ctx.fillStyle=`hsl(${card.bgHue},90%,55%)`; ctx.shadowColor=ctx.fillStyle; ctx.shadowBlur=8;
    ctx.fillRect(bX,bY,bW*hpR,bH);
    ctx.shadowBlur=0; ctx.strokeStyle=`hsla(${card.bgHue},60%,70%,0.6)`; ctx.lineWidth=1;
    ctx.strokeRect(bX,bY,bW,bH);
    // カード残枚数インジケーター（右端の丸）
    for(let i=0;i<this.spellCards.length;i++){
      const cx=bX+bW-12-i*14;
      ctx.beginPath(); ctx.arc(cx,bY+bH/2,4,0,Math.PI*2);
      ctx.fillStyle=i===this.currentCard?`hsl(${card.bgHue},100%,70%)`:i>this.currentCard?'#333344':'#666688';
      ctx.shadowColor=i===this.currentCard?`hsl(${card.bgHue},100%,70%)`:'transparent';
      ctx.shadowBlur=i===this.currentCard?8:0; ctx.fill();
    }
    ctx.fillStyle='#ddd'; ctx.font='bold 9px monospace'; ctx.textAlign='left'; ctx.shadowBlur=0;
    ctx.fillText(`SPELL ${this.currentCard+1}/${this.spellCards.length}`,bX,bY-2);
  }

  /** スペルカード名の大演出（カード切り替え時に全画面を使って表示） */
  drawSpellCardName(ctx){
    if(this.cardAnnounce<=0) return;
    const card = this.card;
    const a    = this.cardAnnounce; // 残りフレーム数（最大270）

    // ── フェーズ分け ──────────────────────────
    // 270〜210: フェードイン (60f)
    // 210〜 60: 全力表示   (150f)
    //  60〜  0: フェードアウト (30f)
    let alpha;
    if(a > 210)       alpha = (270 - a) / 60;       // 0→1
    else if(a > 60)   alpha = 1.0;
    else              alpha = a / 60;                 // 1→0
    alpha = clamp(alpha, 0, 1);

    ctx.save();
    ctx.globalAlpha = alpha;

    // ── 全画面を暗く覆うオーバーレイ ──────────
    ctx.fillStyle = `hsla(${card.bgHue},30%,5%,0.30)`;
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

    // ── 上下の装飾ライン ──────────────────────
    const lineY1 = CANVAS_H/2 - 72, lineY2 = CANVAS_H/2 + 72;
    // 光る横線
    for(const ly of [lineY1, lineY2]){
      const grad = ctx.createLinearGradient(0, ly, CANVAS_W, ly);
      grad.addColorStop(0,   'transparent');
      grad.addColorStop(0.2, `hsl(${card.bgHue},100%,70%)`);
      grad.addColorStop(0.8, `hsl(${card.bgHue},100%,70%)`);
      grad.addColorStop(1,   'transparent');
      ctx.fillStyle   = grad;
      ctx.shadowColor = `hsl(${card.bgHue},100%,70%)`;
      ctx.shadowBlur  = 12;
      ctx.fillRect(0, ly - 1, CANVAS_W, 2);
    }

    // ── カード番号バッジ ──────────────────────
    const badgeX = CANVAS_W/2;
    const badgeY = CANVAS_H/2 - 52;
    ctx.font      = 'bold 11px monospace';
    ctx.fillStyle = `hsl(${card.bgHue},100%,75%)`;
    ctx.shadowColor= `hsl(${card.bgHue},100%,60%)`;
    ctx.shadowBlur = 10;
    ctx.textAlign  = 'center';
    ctx.fillText(
      `✦ SPELL CARD  ${this.currentCard+1} / ${this.spellCards.length} ✦`,
      badgeX, badgeY
    );

    // ── 日本語スペルカード名（大きく・グロー付き）──
    // 文字サイズは最大26pxだが、名前が長い場合は少し小さくする
    const nameFontSize = card.name.length > 10 ? 20 : 26;
    ctx.font        = `bold ${nameFontSize}px 'MS Gothic', 'Hiragino Kaku Gothic ProN', serif`;
    ctx.fillStyle   = '#ffffff';
    ctx.shadowColor = `hsl(${card.bgHue},100%,85%)`;
    ctx.shadowBlur  = 22;
    ctx.textAlign   = 'center';
    ctx.fillText(card.name, CANVAS_W/2, CANVAS_H/2 + 8);

    // ── 二重グロー効果（同じ文字を重ねてにじみを強調）──
    ctx.fillStyle   = `hsla(${card.bgHue},100%,90%,0.3)`;
    ctx.shadowBlur  = 40;
    ctx.fillText(card.name, CANVAS_W/2, CANVAS_H/2 + 8);

    // ── 英語サブタイトル ──────────────────────
    ctx.font        = '11px monospace';
    ctx.fillStyle   = `hsla(${card.bgHue},70%,80%,0.9)`;
    ctx.shadowBlur  = 8;
    ctx.fillText(card.nameEn, CANVAS_W/2, CANVAS_H/2 + 36);

    // ── 停戦中のガイドテキスト（停戦が残っている間のみ）──
    if(this.ceasefireTimer > 0 && a > 60){
      const blink = Math.floor(this.animTick / 8) % 2 === 0;
      if(blink){
        ctx.font      = 'bold 11px monospace';
        ctx.fillStyle = `rgba(255,255,200,0.75)`;
        ctx.shadowBlur= 0;
        ctx.fillText('— 準備して —', CANVAS_W/2, CANVAS_H/2 + 60);
      }
    }

    // ── 四隅の装飾コーナー ────────────────────
    const corners = [[30,lineY1-8],[CANVAS_W-30,lineY1-8],[30,lineY2+8],[CANVAS_W-30,lineY2+8]];
    corners.forEach(([cx,cy]) => {
      ctx.beginPath();
      ctx.arc(cx, cy, 3, 0, Math.PI*2);
      ctx.fillStyle   = `hsl(${card.bgHue},100%,80%)`;
      ctx.shadowColor = `hsl(${card.bgHue},100%,70%)`;
      ctx.shadowBlur  = 8;
      ctx.fill();
    });

    ctx.restore();
  }
}


// ============================================================
//  StarField - 流れる背景の星
// ============================================================
class ParallaxBackground {
  constructor(){
    this.offsets=[0,0,0];
    this.stars=[];
    for(let i=0;i<130;i++){
      this.stars.push({
        x:randFloat(0,CANVAS_W),y:randFloat(0,CANVAS_H),
        speed:randFloat(0.3,2.2),radius:randFloat(0.3,1.6),
        brightness:randFloat(0.3,1.0),hue:randInt(180,280),
      });
    }
  }
  update(){
    BG_LAYERS.forEach((cfg,i)=>{
      const h=(_bgImgs[i]&&_bgImgs[i].naturalHeight)||CANVAS_H;
      this.offsets[i]=(this.offsets[i]+cfg.speed)%h;
    });
    this.stars.forEach(s=>{ s.y+=s.speed; if(s.y>CANVAS_H+2){s.y=-2;s.x=randFloat(0,CANVAS_W);} });
  }
  draw(ctx){
    const hasBg=_bgImgs.some(img=>img!==null);
    BG_LAYERS.forEach((cfg,i)=>{
      const img=_bgImgs[i]; if(!img) return;
      const imgH=img.naturalHeight||CANVAS_H;
      const scale=CANVAS_W/(img.naturalWidth||CANVAS_W);
      const drawH=imgH*scale;
      const oy=this.offsets[i]*scale;
      ctx.save(); ctx.globalAlpha=cfg.alpha;
      ctx.drawImage(img,0,oy-drawH,CANVAS_W,drawH);
      ctx.drawImage(img,0,oy,      CANVAS_W,drawH);
      ctx.restore();
    });
    const sa=hasBg?0.35:1.0;
    this.stars.forEach(s=>{
      ctx.beginPath(); ctx.arc(s.x,s.y,s.radius,0,Math.PI*2);
      ctx.fillStyle=`hsla(${s.hue},60%,95%,${s.brightness*sa})`; ctx.fill();
    });
  }
}


// ============================================================
//  Game - メインゲームコントローラー
// ============================================================
class Game {
  constructor(){
    this.canvas=document.getElementById('gameCanvas');
    this.ctx=this.canvas.getContext('2d');
    this.input=new InputManager();
    this.starField=new ParallaxBackground();
    try { window._SE = new SoundManager(); } catch(e) { window._SE = null; }
    try { window._BGM = new BGMManager(); } catch(e) { window._BGM = null; }
    // 曲名表示状態
    this._trackTitle  = null;   // 表示中の曲名
    this._trackTimer  = 0;      // 表示経過フレーム
    this._trackPhase  = 0;      // 0=縦書きフェードイン, 1=縦書き, 2=縦書きフェードアウト→右上横書きへ
    if (window._BGM) {
      window._BGM.onTrackChange = (title) => {
        this._trackTitle = title;
        this._trackTimer = 0;
        this._trackPhase = 0;  // 縦書き表示からやり直し
      };
    }
    // ユーザー操作のたびに resume() を試みる（AudioContext解除が確実になる）
    window.addEventListener('keydown', function(){ if(window._SE) window._SE.resume(); });
    window.addEventListener('click',   function(){ if(window._SE) window._SE.resume(); });
    window.addEventListener('pointerdown', function(){ if(window._SE) window._SE.resume(); });
    this.state=STATE.START;
    this.score=0; this.lives=3;
    this.hiScore = parseInt(localStorage.getItem('touhou_hiscore') || '0', 10);
    this.enemies=[]; this.boss=null; this.particles=[];
    this.bombEffects=[]; this.bossDefeated=false;
    this.powerItems=[]; // Pアイテムプール
    this.bombItems=[];  // ボムアイテムプール
    // ★ 雑魚敵弾の共通プール（敵が消えても弾はここに残り続ける）
    this.enemyBullets=[];
    this.enemySpawnTimer=0; this.enemySpawnInterval=68;
    this.spawnWave=0;
    this.gameTimer=0;           // プレイ開始からのフレーム数
    this.bossSpawnTime=20*60;   // 20秒後（60fps × 20）にボス出現
    this.uiTick=0; this.flashOn=true; this.flashTimer=0;
    this.player=new Player();
    // タイトル画面のマウスインタラクション
    this._titleHover = null;
    this._menuIndex = 0;  // 0=PLAY, 1=SETTINGS（上下で選択）
    this.canvas.addEventListener('click', e => {
      if(this.state !== STATE.START) return;
      const r = this.canvas.getBoundingClientRect();
      const sx = TOTAL_W / r.width, sy = CANVAS_H / r.height;
      const mx = (e.clientX - r.left)*sx, my = (e.clientY - r.top)*sy;
      // PLAYボタン領域
      if(mx >= 410 && mx <= 590 && my >= 315 && my <= 350){
        this._menuIndex = 0; this._selectMenu();
      }
      // SETTINGSボタン領域
      if(mx >= 410 && mx <= 590 && my >= 358 && my <= 395){
        this._menuIndex = 1; this._selectMenu();
      }
    });
    this.canvas.addEventListener('mousemove', e => {
      const r = this.canvas.getBoundingClientRect();
      const sx = TOTAL_W / r.width, sy = CANVAS_H / r.height;
      const mx = (e.clientX - r.left)*sx, my = (e.clientY - r.top)*sy;
      if(this.state === STATE.START){
        const onPlay     = mx >= 410 && mx <= 590 && my >= 315 && my <= 350;
        const onSettings = mx >= 410 && mx <= 590 && my >= 358 && my <= 395;
        const prev = this._titleHover;
        this._titleHover = onPlay ? 'play' : onSettings ? 'settings' : null;
        if(this._titleHover === 'play'     && prev !== 'play')     { this._menuIndex=0; window._SE&&window._SE.play('menuMove'); }
        if(this._titleHover === 'settings' && prev !== 'settings') { this._menuIndex=1; window._SE&&window._SE.play('menuMove'); }
        this.canvas.style.cursor = (onPlay||onSettings) ? 'pointer' : 'default';
      } else {
        this.canvas.style.cursor = 'default';
        this._titleHover = null;
      }
    });
    this.loop();
  }

  _selectMenu(){
    if(this._menuIndex === 0){
      window._SE && window._SE.play('menuSelect');
      this.reset(); this.state = STATE.PLAYING;
    }
    // SETTINGS は未実装（音だけ鳴らす）
    // else { window._SE && window._SE.play('menuSelect'); }
  }

  reset(){
    window._BGM && window._BGM.stop();
    this.score=0; this.lives=3;
    this._trackTitle = null; this._trackTimer = 0; this._trackPhase = 0;
    this.player=new Player();
    this.enemies=[]; this.boss=null; this.particles=[];
    this.bombEffects=[]; this.enemyBullets=[]; this.bossDefeated=false;
    this.powerItems=[];
    this.bombItems=[];
    this.enemySpawnTimer=0; this.spawnWave=0;
    this.gameTimer=0;
    this._stageTimer=0;  // 面タイトル表示タイマー
  }

  loop(){
    // ============================================================
    //  フレームレート固定：performance.now()で経過時間を計測し
    //  1000/30 ms = 約33ms ごとにのみ update/draw を実行する
    //  これにより画面リフレッシュレートに依存せず30FPS固定になる
    // ============================================================
    const TARGET_INTERVAL = 1000 / 60; // 60FPS = 16.7ms/frame
    const now = performance.now();
    if (!this._lastTime) this._lastTime = now;
    const elapsed = now - this._lastTime;

    if (elapsed >= TARGET_INTERVAL) {
      // 余剰時間をずらして蓄積ズレを防ぐ
      this._lastTime = now - (elapsed % TARGET_INTERVAL);
      this.update();
      this.draw();
    }
    requestAnimationFrame(()=>this.loop());
  }

  update(){
    this.uiTick++; this.starField.update();
    switch(this.state){
      case STATE.START:    this.updateStart();    break;
      case STATE.PLAYING:  this.updatePlaying();  break;
      case STATE.GAMEOVER: this.updateGameOver(); break;
    }
    this.input.clearJustPressed();
  }

  updateStart(){
    window._BGM && window._BGM.stop();
    // 上下でメニュー項目移動
    if(this.input.isJustPressed('ArrowUp') || this.input.isJustPressed('ArrowDown')){
      const prev = this._menuIndex;
      this._menuIndex = this._menuIndex === 0 ? 1 : 0;
      if(this._menuIndex !== prev) window._SE && window._SE.play('menuMove');
    }
    // Space / Z で決定
    if(this.input.isJustPressed('Space') || this.input.isJustPressed('KeyZ')){
      this._selectMenu();
    }
    this.flashTimer++; if(this.flashTimer>28){this.flashOn=!this.flashOn;this.flashTimer=0;}
  }

  updateGameOver(){
    window._BGM && window._BGM.stop();
    if(this.input.isJustPressed('KeyR')){ this.reset(); this.state=STATE.PLAYING; }
  }

  updatePlaying(){
    this.gameTimer++;
    this._stageTimer++;
    // 曲名タイマー更新
    if (this._trackTitle) this._trackTimer++;

    // --- BGM制御 ---
    if (!this.bossDefeated) {
      if (this.boss) {
        window._BGM && window._BGM.play('boss');
      } else {
        window._BGM && window._BGM.play('stage');
      }
    } else {
      window._BGM && window._BGM.stop();
    }
    // 自機更新（ボム使用のためgameオブジェクトを渡す）
    this.player.update(this.input, this);

    // --- 敵出現（ボスがいない間）---
    if(!this.boss){
      this.enemySpawnTimer++;
      if(this.enemySpawnTimer>=this.enemySpawnInterval){
        this.enemySpawnTimer=0; this.spawnWave++;
        this.spawnEnemyWave();
      }
    }

    // --- ボス出現（開始から20秒後）---
    if(this.gameTimer>=this.bossSpawnTime&&!this.boss&&!this.bossDefeated){
      this.enemies=[]; this.boss=new Boss(this.player, this);
    }

    this.enemies.forEach(e=>e.update());
    this.enemies=this.enemies.filter(e=>e.active);

    // ★ 共通プールの敵弾を更新（splice でインプレース削除）
    this.enemyBullets.forEach(b=>b.update());
    for(let i=this.enemyBullets.length-1;i>=0;i--){
      if(!this.enemyBullets[i].active) this.enemyBullets.splice(i,1);
    }

    if(this.boss){
      this.boss.update();
      if(!this.boss.active){
        this.score+=this.boss.score;
        this.spawnExplosion(this.boss.x,this.boss.y,'#ff8800',80);
        this.boss=null; this.bossDefeated=true;
      }
    }

    // --- Pアイテム更新・取得判定 ---
    this.powerItems.forEach(item=>item.update());
    this.powerItems=this.powerItems.filter(item=>item.active);
    for(const item of this.powerItems){
      if(dist(this.player.x,this.player.y,item.x,item.y)<item.radius+this.player.hitRadius+12){
        item.active=false;
        window._SE && window._SE.play('powerItem');
        this.player.powerLevel=Math.min(this.player.powerLevel+1, this.player.powerMax);
        this.spawnExplosion(item.x,item.y,'#ff4444',6);
      }
    }

    // --- ボムアイテム更新・取得判定 ---
    this.bombItems.forEach(item=>item.update());
    this.bombItems=this.bombItems.filter(item=>item.active);
    for(const item of this.bombItems){
      if(dist(this.player.x,this.player.y,item.x,item.y)<item.radius+this.player.hitRadius+12){
        item.active=false;
        window._SE && window._SE.play('bombItem');
        this.player.bombs=Math.min(this.player.bombs+1, 9); // 最大9個まで
        this.spawnExplosion(item.x,item.y,'#4466ff',6);
      }
    }

    this.bombEffects.forEach(b=>b.update());
    this.bombEffects=this.bombEffects.filter(b=>b.active);
    this.particles.forEach(p=>p.update());
    this.particles=this.particles.filter(p=>p.active);
    this.checkCollisions();
  }

  /** ウェーブ数に応じて異なるタイプの敵を出現させる */
  spawnEnemyWave(){
    const w=this.spawnWave;
    if(w%12===0){ this.spawnEnemy('fortress'); }
    else if(w%5===0){ this.spawnEnemy('spread'); this.spawnEnemy('spread',80); }
    else if(w%3===0){ this.spawnEnemy('fast');   this.spawnEnemy('fast',60); }
    else { this.spawnEnemy('normal'); if(this.score>=1500) this.spawnEnemy('normal',80); }
  }

  spawnEnemy(type='normal', xOffset=0){
    const x=clamp(randFloat(40,CANVAS_W-40)+xOffset,30,CANVAS_W-30);
    // ★ enemyBullets（共通プール）を渡すことで、撃破後も弾が残る
    this.enemies.push(new Enemy(x,-25,this.player,type,this.enemyBullets));
  }

  spawnExplosion(x,y,color,count=20){
    for(let i=0;i<count;i++) this.particles.push(new Particle(x,y,color));
  }

  // ============================================================
  //  ボム発動処理
  //  - 全敵弾を消す（メモリリーク防止も兼ねてactiveをfalseに）
  //  - ボムエフェクト生成
  //  - 雑魚敵を即撃破・ボスに大ダメージ
  // ============================================================
  activateBomb(bx, by){
    window._SE && window._SE.play('bomb');
    this.bombEffects.push(new BombEffect(bx, by));
    // ★ 共通プールの雑魚敵弾を全消去
    this.enemyBullets.forEach(b=>{b.active=false;});
    if(this.boss) this.boss.bullets.forEach(b=>{b.active=false;});
    this.enemies.forEach(e=>{ e.damage(9999); this.spawnExplosion(e.x,e.y,'#cc88ff',15); this.score+=e.score; });
    this.enemies=this.enemies.filter(e=>e.active);
    if(this.boss&&!this.boss.entering){
      this.boss.damage(80);
      this.spawnExplosion(this.boss.x,this.boss.y,'#ff88ff',20);
    }
    for(let i=0;i<30;i++){
      this.particles.push(new Particle(randFloat(0,CANVAS_W),randFloat(0,CANVAS_H),`hsl(${randInt(240,320)},100%,70%)`,randFloat(3,8)));
    }
  }

  // ============================================================
  //  当たり判定（円と円の衝突判定: 距離 < r1 + r2）
  // ============================================================
  checkCollisions(){
    const player=this.player;
    // 敵弾＝雑魚共通プール＋ボス弾をまとめて判定
    const allEB = this.boss
      ? [...this.enemyBullets, ...this.boss.bullets]
      : this.enemyBullets;

    // 1. 敵弾 vs 自機（hitRadiusは極小な3px）
    if(player.invincible===0){
      for(const eb of allEB){
        if(!eb.active) continue;
        if(dist(player.x,player.y,eb.x,eb.y)<player.hitRadius+eb.hitRadius){
          eb.active=false;
          window._SE && window._SE.play('playerHit');
          if(player.hit()){
            this.lives--;
            this.spawnExplosion(eb.x, eb.y, '#88ccff', 20);
            if(this.lives<=0){ if(this.score>this.hiScore){ this.hiScore=this.score; localStorage.setItem('touhou_hiscore', this.hiScore); } this.state=STATE.GAMEOVER; }
            break;
          }
        }
      }
    }

    // 2. 自機弾 vs 雑魚敵本体（弾には当たらない）
    for(const pb of player.bullets){
      if(!pb.active) continue;
      for(const e of this.enemies){
        if(!e.active) continue;
        if(dist(pb.x,pb.y,e.x,e.y)<pb.radius+e.radius){
          pb.active=false;
          window._SE && window._SE.play('playerBulletHit');
          if(e.damage(pb.power)){
            this.score+=e.score;
            window._SE && window._SE.play('enemyDeath');
            this.spawnExplosion(e.x,e.y,'#ff88ff',18);
            // 敵撃破時に50%の確率でPアイテム、7%の確率でボムアイテムをドロップ
            if(Math.random()<0.5) this.powerItems.push(new PowerItem(e.x,e.y));
            if(Math.random()<0.07) this.bombItems.push(new BombItem(e.x,e.y));
          } else this.spawnExplosion(pb.x,pb.y,'#ffffff',3);
          break;
        }
      }
    }

    // 3. 自機弾 vs ボス本体
    if(this.boss&&!this.boss.entering){
      for(const pb of player.bullets){
        if(!pb.active) continue;
        if(dist(pb.x,pb.y,this.boss.x,this.boss.y)<pb.radius+this.boss.radius){
          pb.active=false;
          window._SE && window._SE.play('playerBulletHit');
          if(!this.boss.damage(pb.power)) this.spawnExplosion(pb.x,pb.y,'#ffffff',2);
        }
      }
    }
  }

  // ============================================================
  //  描画処理
  // ============================================================
  draw(){
    const ctx=this.ctx;
    // キャンバス全体をクリア（600×600）
    ctx.fillStyle='#050010'; ctx.fillRect(0,0,TOTAL_W,CANVAS_H);
    // 星フィールドはゲームエリア(0〜400)のみに描画
    if(this.state !== STATE.START){
      ctx.save();
      ctx.beginPath(); ctx.rect(0,0,CANVAS_W,CANVAS_H); ctx.clip();
      this.starField.draw(ctx);
      ctx.restore();
    }
    switch(this.state){
      case STATE.START:    this.drawStart(ctx);    break;
      case STATE.PLAYING:  this.drawPlaying(ctx);  break;
      case STATE.GAMEOVER: this.drawGameOver(ctx); break;
    }
  }

  drawStart(ctx){
    const W=TOTAL_W, H=CANVAS_H, t=this.uiTick;

    // ── 背景 ──
    if(TITLE_BG_IMG){
      ctx.drawImage(TITLE_BG_IMG, 0, 0, W, H);
      ctx.fillStyle='rgba(0,0,10,0.58)'; ctx.fillRect(0,0,W,H);
    } else {
      // デフォルトグラデーション背景
      const bg=ctx.createRadialGradient(W/2,H*0.45,0,W/2,H*0.45,420);
      bg.addColorStop(0,'#0d0025'); bg.addColorStop(1,'#03000c');
      ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
      // 星粒
      for(let i=0;i<28;i++){
        const sx=(Math.sin(i*127.3)*0.5+0.5)*W;
        const sy=(Math.sin(i*311.7)*0.5+0.5)*H;
        const sa=0.2+Math.sin(t*0.04+i)*0.15;
        ctx.beginPath(); ctx.arc(sx,sy,0.8+Math.sin(i*73)*0.6,0,Math.PI*2);
        ctx.fillStyle=`rgba(200,160,255,${sa})`; ctx.fill();
      }
    }

    ctx.save();

    // ── 上部タイトル帯 ──
    ctx.fillStyle='rgba(10,0,30,0.65)'; ctx.fillRect(0,0,W,52);
    ctx.strokeStyle='rgba(160,80,255,0.35)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(0,52); ctx.lineTo(W,52); ctx.stroke();
    ctx.textAlign='center';
    ctx.font='bold 15px serif'; ctx.fillStyle='rgba(210,170,255,0.92)';
    ctx.shadowColor='#9955ff'; ctx.shadowBlur=12;
    ctx.fillText('東方二次創作弾幕シューティング 東方秘荘郷', W/2, 33);
    ctx.shadowBlur=0;

    // ── 散りばめられた漢字 ──
    const kanjis=[
      {ch:'東', x:265, y:130, size:78, col:'#ff99cc'},
      {ch:'方', x:185, y:240, size:78, col:'#cc88ff'},
      {ch:'秘', x:255, y:345, size:78, col:'#88aaff'},
      {ch:'荘', x:310, y:435, size:78, col:'#99ffdd'},
      {ch:'郷', x:240, y:532, size:78, col:'#ffdd88'},
    ];
    kanjis.forEach((k,i)=>{
      const wave=Math.sin(t*0.035+i*1.3)*4;
      ctx.font=`bold ${k.size}px serif`;
      ctx.fillStyle=k.col;
      ctx.shadowColor=k.col; ctx.shadowBlur=22;
      ctx.textAlign='center';
      ctx.fillText(k.ch, k.x, k.y+wave);
    });
    ctx.shadowBlur=0;

    // ── 右側メニュー ──
    const mx=430;
    // ハイスコア（小）
    ctx.textAlign='left'; ctx.font='10px monospace';
    ctx.fillStyle='rgba(180,140,255,0.6)'; ctx.shadowBlur=0;
    ctx.fillText(`HI: ${this.hiScore.toString().padStart(8,'0')}`, mx, 290);

    // メニュー項目（PLAY / SETTINGS）
    const menuItems = [
      { label: '▶  PLAY',     y: 338 },
      { label: '   SETTINGS', y: 378 },
    ];
    menuItems.forEach((item, i) => {
      const selected = this._menuIndex === i;
      const hovered  = (i===0 && this._titleHover==='play') ||
                       (i===1 && this._titleHover==='settings');
      const active = selected || hovered;
      ctx.textAlign='left';
      ctx.font = i===0 ? 'bold 22px serif' : '18px serif';
      ctx.fillStyle   = active ? '#ffffff'          : (i===0 ? '#ffee88' : 'rgba(130,110,180,0.75)');
      ctx.shadowColor = active ? '#ffffff'           : (i===0 ? '#ffaa00' : 'transparent');
      ctx.shadowBlur  = active ? 24                  : (i===0 ? 8        : 0);
      ctx.fillText(item.label, mx, item.y);
      // 選択中は左に「►」インジケーター
      if(selected){
        ctx.font='12px monospace'; ctx.fillStyle='#ffee88';
        ctx.shadowColor='#ffaa00'; ctx.shadowBlur=10;
        ctx.fillText('►', mx - 16, item.y);
        ctx.strokeStyle='rgba(255,240,120,0.5)'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(mx,item.y+4); ctx.lineTo(mx+135,item.y+4); ctx.stroke();
      }
      ctx.shadowBlur=0;
      // SETTINGSの「未実装」注記
      if(i===1){
        ctx.font='9px monospace'; ctx.fillStyle='rgba(70,60,100,0.8)';
        ctx.fillText('（未実装）', mx+2, item.y+16);
      }
    });

    // 操作ガイド（小）
    ctx.textAlign='center'; ctx.font='9px monospace';
    ctx.fillStyle='rgba(130,110,180,0.55)';
    ctx.fillText('Arrow:移動  Z/Space:ショット  Shift:低速  X:ボム', W/2, H-22);
    ctx.fillText('Space / Z / クリックでスタート  ↑↓ でメニュー移動', W/2, H-8);

    // 点滅プロンプト
    if(this.flashOn){
      ctx.font='bold 13px monospace'; ctx.fillStyle='rgba(220,200,255,0.85)';
      ctx.shadowColor='#aa88ff'; ctx.shadowBlur=12;
      ctx.textAlign='right';
      ctx.fillText('Press SPACE', W-24, H-22);
      ctx.shadowBlur=0;
    }

    // 装飾パーティクル（左半分）
    for(let i=0;i<14;i++){
      const a=(Math.PI*2/14)*i+t*0.007;
      const px=155+Math.cos(a+t*0.005)*155;
      const py=H/2+Math.sin(a*1.4)*210;
      if(px>CANVAS_W-10) continue; // パネル側には描かない
      ctx.beginPath(); ctx.arc(px,py,1.2,0,Math.PI*2);
      ctx.fillStyle=`rgba(160,90,255,${0.18+Math.sin(t*0.05+i)*0.12})`; ctx.fill();
    }

    // 垂直区切り線（ゲームエリア境界）
    const grad=ctx.createLinearGradient(CANVAS_W,0,CANVAS_W,H);
    grad.addColorStop(0,'rgba(100,50,200,0)');
    grad.addColorStop(0.3,'rgba(140,70,255,0.4)');
    grad.addColorStop(0.7,'rgba(140,70,255,0.4)');
    grad.addColorStop(1,'rgba(100,50,200,0)');
    ctx.strokeStyle=grad; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(CANVAS_W,0); ctx.lineTo(CANVAS_W,H); ctx.stroke();

    ctx.restore();
  }

  drawPlaying(ctx){
    // ゲームオブジェクトはゲームエリア(0〜CANVAS_W)のみに描画
    ctx.save();
    ctx.beginPath(); ctx.rect(0,0,CANVAS_W,CANVAS_H); ctx.clip();
    this.particles.forEach(p=>p.draw(ctx));
    this.bombEffects.forEach(b=>b.draw(ctx));
    // ★ 共通プールの雑魚敵弾を描画（敵が消えても弾は残る）
    this.enemyBullets.forEach(b=>b.draw(ctx));
    this.powerItems.forEach(item=>item.draw(ctx));
    this.bombItems.forEach(item=>item.draw(ctx));
    this.enemies.forEach(e=>e.draw(ctx));
    if(this.boss) this.boss.draw(ctx);
    this.player.draw(ctx,this.input);
    // ── 曲名表示（ゲームエリア内に描画）──
    if (this._trackTitle) this.drawTrackTitle(ctx);
    ctx.restore();
    // 右パネルHUD（クリップ外に描画）
    this.drawHUD(ctx);
    // ボス出現5秒前（15秒経過〜20秒）にWARNING表示
    const warn = this.gameTimer>=15*60 && this.gameTimer<this.bossSpawnTime && !this.boss && !this.bossDefeated;
    if(warn) this.drawWarning(ctx);
    if(this.bossDefeated&&!this.boss) this.drawClear(ctx);
    // 面タイトル表示（ゲーム開始直後）
    if(this._stageTimer < 180) this.drawStageTitle(ctx);
  }

  /** ゲームエリア内に曲名を表示（縦書き3秒→右上横書き常時） */
  drawTrackTitle(ctx){
    const VERT_FRAMES = 180; // 縦書き表示（3秒@60fps）
    const FADE        = 30;  // フェード時間
    const timer = this._trackTimer;
    const title = this._trackTitle;
    if (!title) return;

    if (timer <= VERT_FRAMES) {
      // ── 縦書き：画面右下 ──
      const fadeIn  = Math.min(timer / FADE, 1.0);
      const fadeOut = timer > VERT_FRAMES - FADE
                      ? 1.0 - (timer - (VERT_FRAMES - FADE)) / FADE
                      : 1.0;
      const alpha = fadeIn * fadeOut;

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.font = 'bold 15px serif';
      ctx.textAlign = 'center';
      ctx.fillStyle   = '#ffe8ff';
      ctx.shadowColor = '#cc66ff';
      ctx.shadowBlur  = 16;

      const chars  = title.split('');
      const charH  = 18;
      const textX  = CANVAS_W - 22;
      // 文字列を下から上へ並べる（最後の文字が一番上）
      const bottomY = CANVAS_H - 60;
      chars.forEach((ch, i) => {
        const cy = bottomY - (chars.length - 1 - i) * charH;
        ctx.fillText(ch, textX, cy);
      });

      // 「♪」マーク（一番下）
      ctx.font = '12px serif';
      ctx.fillStyle = '#cc88ff';
      ctx.shadowBlur = 8;
      ctx.fillText('♪', textX, bottomY + 18);

      ctx.restore();

    } else {
      // ── 横書き：左上・小さく常時表示 ──
      const fadeIn = Math.min((timer - VERT_FRAMES) / FADE, 1.0);
      ctx.save();
      ctx.globalAlpha = fadeIn * 0.75;
      ctx.font = 'bold 10px serif';
      ctx.textAlign = 'left';
      ctx.fillStyle   = '#ffe8ff';
      ctx.shadowColor = '#cc66ff';
      ctx.shadowBlur  = 8;
      ctx.fillText('♪ ' + title, 8, 18);
      ctx.restore();
    }
  }

  /** 右パネルHUD：ハイスコア・スコア・残機・ボム・パワーバー・画像 */
  drawHUD(ctx){
    const px=PANEL_X, pw=PANEL_W, ph=CANVAS_H;
    const pad=16, cx2=px+pw/2, lx=px+pad;
    const t=this.uiTick;
    ctx.save();

    // ── パネル背景 ──
    ctx.fillStyle='rgba(4,0,18,0.93)'; ctx.fillRect(px,0,pw,ph);
    // 左境界線
    const lineGrad=ctx.createLinearGradient(px,0,px,ph);
    lineGrad.addColorStop(0,'rgba(120,50,220,0)');
    lineGrad.addColorStop(0.15,'rgba(150,70,255,0.5)');
    lineGrad.addColorStop(0.85,'rgba(150,70,255,0.5)');
    lineGrad.addColorStop(1,'rgba(120,50,220,0)');
    ctx.strokeStyle=lineGrad; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(px,0); ctx.lineTo(px,ph); ctx.stroke();

    ctx.textAlign='left'; ctx.shadowBlur=0;

    // ── HI-SCORE ──
    let y=32;
    ctx.font='bold 8px monospace'; ctx.fillStyle='rgba(160,120,255,0.6)';
    ctx.fillText('HI-SCORE', lx, y); y+=16;
    ctx.font='bold 13px monospace'; ctx.fillStyle='#cc88ff';
    ctx.shadowColor='#9944ee'; ctx.shadowBlur=6;
    ctx.fillText(this.hiScore.toString().padStart(9,'0'), lx, y);
    ctx.shadowBlur=0;

    // ── SCORE ──
    y+=20;
    ctx.font='bold 8px monospace'; ctx.fillStyle='rgba(160,120,255,0.6)';
    ctx.fillText('SCORE', lx, y); y+=18;
    ctx.font='bold 15px monospace'; ctx.fillStyle='#ffee88';
    ctx.shadowColor='#ffaa00'; ctx.shadowBlur=8;
    ctx.fillText(this.score.toString().padStart(9,'0'), lx, y);
    ctx.shadowBlur=0;

    // 区切り線
    y+=14;
    const divGrad=ctx.createLinearGradient(lx,y,px+pw-pad,y);
    divGrad.addColorStop(0,'rgba(120,60,200,0)');
    divGrad.addColorStop(0.4,'rgba(140,70,220,0.5)');
    divGrad.addColorStop(1,'rgba(120,60,200,0)');
    ctx.strokeStyle=divGrad; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(lx,y); ctx.lineTo(px+pw-pad,y); ctx.stroke();

    // ── LIVES ──
    y+=16;
    ctx.font='bold 8px monospace'; ctx.fillStyle='rgba(160,120,255,0.6)';
    ctx.fillText('LIVES', lx, y); y+=18;
    for(let i=0;i<this.lives;i++){
      ctx.font='18px serif'; ctx.fillStyle='#ff4488';
      ctx.shadowColor='#ff0044'; ctx.shadowBlur=7;
      ctx.fillText('♥', lx+i*22, y);
    }
    ctx.shadowBlur=0;

    // ── BOMB ──
    y+=24;
    ctx.font='bold 8px monospace'; ctx.fillStyle='rgba(160,120,255,0.6)';
    ctx.fillText('BOMB', lx, y); y+=18;
    for(let i=0;i<this.player.bombs;i++){
      ctx.font='16px serif'; ctx.fillStyle='#88aaff';
      ctx.shadowColor='#4466ff'; ctx.shadowBlur=7;
      ctx.fillText('✦', lx+i*20, y);
    }
    ctx.shadowBlur=0;

    // 区切り線
    y+=18;
    ctx.strokeStyle=divGrad; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(lx,y); ctx.lineTo(px+pw-pad,y); ctx.stroke();

    // ── POWER バー ──
    y+=16;
    const pl=this.player.powerLevel, pm=this.player.powerMax;
    const bw=pw-pad*2, bh=7;
    ctx.font='bold 8px monospace'; ctx.fillStyle='rgba(160,120,255,0.6)';
    ctx.fillText(`POWER  ${pl} / ${pm}`, lx, y); y+=10;
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(lx,y,bw,bh);
    const pHue=60+(pl/pm)*60;
    ctx.fillStyle=`hsl(${pHue},100%,55%)`;
    ctx.shadowColor=`hsl(${pHue},100%,65%)`; ctx.shadowBlur=6;
    ctx.fillRect(lx,y,bw*(pl/pm),bh);
    ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(140,90,200,0.35)'; ctx.lineWidth=1;
    ctx.strokeRect(lx,y,bw,bh);

    // ── ボス出現カウントダウン ──
    if(!this.boss && !this.bossDefeated){
      const rem=Math.max(0,Math.ceil((this.bossSpawnTime-this.gameTimer)/60));
      y+=24;
      ctx.textAlign='center'; ctx.font='bold 10px monospace';
      ctx.fillStyle= rem<=5 ? '#ff4444' : 'rgba(160,120,255,0.55)';
      ctx.shadowColor= rem<=5 ? '#ff0000' : 'transparent';
      ctx.shadowBlur= rem<=5 ? 10 : 0;
      ctx.fillText(`BOSS  ${rem}s`, cx2, y);
      ctx.shadowBlur=0;
    }

    // ── 下部画像（キャラクター立ち絵など） ──
    const imgSize=pw-16, imgX=px+8, imgY=ph-imgSize-8;
    if(HUD_IMG){
      ctx.drawImage(HUD_IMG, imgX, imgY, imgSize, imgSize);
      ctx.strokeStyle='rgba(150,80,255,0.45)'; ctx.lineWidth=1;
      ctx.strokeRect(imgX,imgY,imgSize,imgSize);
    } else {
      // プレースホルダー
      ctx.fillStyle='rgba(18,6,40,0.6)'; ctx.fillRect(imgX,imgY,imgSize,imgSize);
      ctx.strokeStyle='rgba(80,40,120,0.35)'; ctx.lineWidth=1;
      ctx.strokeRect(imgX,imgY,imgSize,imgSize);
      ctx.textAlign='center'; ctx.font='9px monospace';
      ctx.fillStyle='rgba(80,60,120,0.7)';
      ctx.fillText('hud_image.png', imgX+imgSize/2, imgY+imgSize/2-5);
      ctx.fillText('を配置できます', imgX+imgSize/2, imgY+imgSize/2+10);
    }

    ctx.restore();
  }

  drawStageTitle(ctx){
    const TOTAL    = 180;
    const FADE_IN  = 24;
    const FADE_OUT = 40;
    const t = this._stageTimer;

    let alpha;
    if      (t < FADE_IN)          alpha = t / FADE_IN;
    else if (t > TOTAL - FADE_OUT) alpha = (TOTAL - t) / FADE_OUT;
    else                           alpha = 1.0;
    alpha = Math.max(0, Math.min(1, alpha));
    if (alpha <= 0) return;

    ctx.save();
    ctx.globalAlpha = alpha;

    const cx = CANVAS_W / 2;
    const cy = CANVAS_H / 2;

    // 背景オーバーレイ
    ctx.fillStyle = 'rgba(0,0,15,0.50)';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

    ctx.textAlign = 'center';

    // ─────────────────────────────────────────
    //  メイン縦書き列：「〜 幻 想 郷 の 結 界 〜」
    //  「〜」だけ 90° 回転して描画
    // ─────────────────────────────────────────
    const mainChars  = ['〜','幻','想','郷','の','結','界','〜'];
    const mainSize   = 38;
    const mainGap    = mainSize + 6;
    const totalMainH = mainChars.length * mainGap - 6;
    const mainStartY = cy - totalMainH / 2 + mainSize * 0.8;
    const mainX      = cx;

    ctx.font        = `bold ${mainSize}px serif`;
    ctx.fillStyle   = '#ffffff';
    ctx.shadowColor = '#cc88ff';
    ctx.shadowBlur  = 22;

    mainChars.forEach((ch, i) => {
      const charY = mainStartY + i * mainGap;
      if (ch === '〜') {
        // 「〜」を 90° 回転（縦書きで波ダッシュらしく見せる）
        ctx.save();
        ctx.translate(mainX + TILDE_OFFSET_X, charY - mainSize * 0.3 + TILDE_OFFSET_Y);
        ctx.rotate(Math.PI / 2);
        ctx.fillText(ch, 0, 0);
        ctx.restore();
      } else {
        ctx.fillText(ch, mainX, charY);
      }
    });

    // ─────────────────────────────────────────
    //  サブ：「一面」を上部に小さく
    // ─────────────────────────────────────────
    const subSize  = 18;
    const subChars = ['一','面'];
    const subX     = cx;
    const subStartY = mainStartY - subSize * 3.5;

    ctx.font        = `bold ${subSize}px serif`;
    ctx.fillStyle   = 'rgba(210,180,255,0.85)';
    ctx.shadowColor = '#aa66ff';
    ctx.shadowBlur  = 10;

    subChars.forEach((ch, i) => {
      ctx.fillText(ch, subX, subStartY + i * (subSize + 4));
    });

    // 「一面」と「〜幻想郷…」の間の区切り線
    const divY = mainStartY - subSize * 0.8;
    const divW = 60;
    const g = ctx.createLinearGradient(cx - divW, divY, cx + divW, divY);
    g.addColorStop(0,   'rgba(200,160,255,0)');
    g.addColorStop(0.5, 'rgba(200,160,255,0.6)');
    g.addColorStop(1,   'rgba(200,160,255,0)');
    ctx.strokeStyle = g; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx - divW, divY); ctx.lineTo(cx + divW, divY); ctx.stroke();

    ctx.restore();
  }

  drawWarning(ctx){
    if(Math.floor(this.uiTick/14)%2===0){
      ctx.save(); ctx.textAlign='center';
      ctx.font='bold 22px monospace'; ctx.fillStyle='#ff4444'; ctx.shadowColor='#ff0000'; ctx.shadowBlur=22;
      ctx.fillText('WARNING',CANVAS_W/2,CANVAS_H/2);
      ctx.font='12px monospace'; ctx.fillStyle='#ffaaaa'; ctx.shadowBlur=8;
      ctx.fillText('ボスが接近しています！',CANVAS_W/2,CANVAS_H/2+28);
      ctx.restore();
    }
  }

  drawClear(ctx){
    const pulse=Math.sin(this.uiTick*0.05)*0.2+0.8;
    ctx.save(); ctx.textAlign='center'; ctx.globalAlpha=pulse;
    ctx.font='bold 28px serif'; ctx.fillStyle='#ffdd44'; ctx.shadowColor='#ffaa00'; ctx.shadowBlur=22;
    ctx.fillText('STAGE CLEAR',CANVAS_W/2,CANVAS_H/2-20);
    ctx.font='14px monospace'; ctx.fillStyle='#ffffff'; ctx.shadowBlur=0;
    ctx.fillText('おめでとうございます！',CANVAS_W/2,CANVAS_H/2+18);
    ctx.restore();
  }

  drawGameOver(ctx){
    const cx=TOTAL_W/2, t=this.uiTick;
    ctx.fillStyle='rgba(0,0,12,0.80)'; ctx.fillRect(0,0,TOTAL_W,CANVAS_H);
    ctx.save(); ctx.textAlign='center';
    ctx.font='bold 48px serif'; ctx.fillStyle='#ff3333';
    ctx.shadowColor='#ff0000'; ctx.shadowBlur=30;
    ctx.fillText('GAME OVER',cx+Math.sin(t*0.12)*2,220);
    ctx.font='bold 14px monospace'; ctx.fillStyle='#aaaacc'; ctx.shadowColor='#fff'; ctx.shadowBlur=6;
    ctx.fillText('FINAL SCORE',cx,278);
    ctx.font='bold 32px monospace'; ctx.fillStyle='#ffee88'; ctx.shadowColor='#ffaa00'; ctx.shadowBlur=18;
    ctx.fillText(this.score.toString().padStart(9,'0'),cx,318);
    ctx.shadowBlur=0;
    if(this.score>=this.hiScore&&this.score>0){
      ctx.font='bold 14px monospace'; ctx.fillStyle='#ff88ff'; ctx.shadowColor='#ff44ff'; ctx.shadowBlur=14;
      ctx.fillText('✦  NEW HI-SCORE  ✦',cx,352);
    } else {
      ctx.font='12px monospace'; ctx.fillStyle='#555577'; ctx.shadowBlur=0;
      ctx.fillText(`Hi-Score: ${this.hiScore.toString().padStart(9,'0')}`,cx,352);
    }
    ctx.shadowBlur=0;
    if(Math.floor(t/24)%2===0){
      ctx.font='bold 15px monospace'; ctx.fillStyle='#ccccff'; ctx.shadowColor='#8888ff'; ctx.shadowBlur=10;
      ctx.fillText('Press R to Restart',cx,410);
    }
    ctx.restore();
  }
}

// ============================================================
//  エントリーポイント
// ============================================================
window.addEventListener('load', ()=>{
  try {
    new Game();
    console.log('幻想郷の戦い - ボム&スペルカード5枚版 起動！');
  } catch(e) {
    console.error('ゲーム起動エラー:', e);
    // エラーがあってもキャンバスに表示を試みる
    try {
      const c = document.getElementById('gameCanvas');
      if (c) {
        const ctx = c.getContext('2d');
        ctx.fillStyle = '#050010';
        ctx.fillRect(0, 0, 400, 600);
        ctx.fillStyle = '#ff4444';
        ctx.font = 'bold 14px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('起動エラー / Startup Error', 200, 280);
        ctx.font = '11px monospace';
        ctx.fillStyle = '#ffaaaa';
        ctx.fillText(String(e).slice(0, 50), 200, 310);
        ctx.fillText('ブラウザのコンソール(F12)を確認してください', 200, 335);
      }
    } catch(e2) {}
  }
});
